set_outside_region:
  name: Set Outside Region
  description: >
    Mark the PreCom user as outside their response region for a number of hours.
  fields:
    hours:
      name: Hours
      description: Number of hours to remain outside the region (1-72).
      required: true
      selector:
        number:
          min: 1
          max: 72
          mode: box
          unit_of_measurement: h

set_in_region:
  name: Set In Region
  description: >
    Cancel the outside-region status and mark the PreCom user as back inside
    their response region.
  fields: {}

update_alarm:
  name: Update Alarm
  description: >
    Force an immediate refresh of the latest alarm data from PreCom,
    without waiting for the next scheduled poll interval.
  fields: {}
