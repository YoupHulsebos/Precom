set_unavailable:
  name: Set Unavailable
  description: >
    Mark the PreCom user as unavailable (outside region) for a number of hours.
  target:
    entity:
      integration: precom
      domain: binary_sensor
  fields:
    hours:
      name: Hours
      description: Number of hours to remain unavailable (1-72).
      required: true
      selector:
        number:
          min: 1
          max: 72
          mode: box
          unit_of_measurement: h

set_available:
  name: Set Available
  description: >
    Cancel the unavailable status and mark the PreCom user as available again.
  target:
    entity:
      integration: precom
      domain: binary_sensor
  fields: {}

update_alarm:
  name: Update Alarm
  description: >
    Force an immediate refresh of the latest alarm data from PreCom,
    without waiting for the next scheduled poll interval.
  target:
    entity:
      integration: precom
      domain: sensor
  fields: {}

get_alarm_portal_details:
  name: Get Alarm Portal Details
  description: >
    Look up portal.pre-com.nl report details for a specific alarm message text
    and return response data, staffing requirements, and proposed functions.
  fields:
    melding:
      name: Melding
      description: The exact alarm message text to search for in the portal report.
      required: true
      example: P 2 BON-04 BR afval Paasberglaan Arnhem 075341
      selector:
        text:
